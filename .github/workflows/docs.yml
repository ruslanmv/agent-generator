name: docs

# Keep the MkDocs site in sync with the repo: build and publish the docs to the
# gh-pages branch on every push to the default branch that touches docs/ or the
# MkDocs config. Manual runs are available via workflow_dispatch.
#
# Publishes to https://ruslanmv.github.io/agent-generator/ (Pages source = gh-pages).

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write          # mkdocs gh-deploy pushes the built site to gh-pages

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # gh-deploy needs full history to update gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs + Material
        run: python -m pip install --upgrade "mkdocs-material" "mkdocs"

      - name: Build (verify the site compiles)
        run: mkdocs build --clean

      - name: Deploy to gh-pages
        run: mkdocs gh-deploy --force --no-history
