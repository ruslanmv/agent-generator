# ────────────────────────────────────────────────────────────────
#  .github/workflows/release.yml
#  Build distributions on GitHub Release and publish to PyPI
# ────────────────────────────────────────────────────────────────
#
#  • Trigger: when a GitHub release is *published* (draft → public).
#  • Output: source‑dist + wheel attached to the release assets.
#  • Publish: uploads both files to PyPI via OIDC‑based trusted publishing,
#    but only after a clean-venv smoke install proves the wheel imports
#    and the CLI prints the tagged version. PyPI does not allow
#    re-uploading the same version, so we want to fail loudly *before*
#    the publish step rather than yank afterwards.
#
#  Prerequisites:
#    • Your PyPI project has "trusted publishing" enabled.
#    • The repository is approved as a trusted publisher.
# ------------------------------------------------------------------

name: Build & Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: write   # needed to upload artefacts to the GitHub release
  id-token: write   # required for OIDC / trusted publishing

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload artefacts to the GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Persist artefacts for publish job
        uses: actions/upload-artifact@v4
        with:
          name: python-dists
          path: dist/

  smoke:
    name: Smoke-install wheel
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dists
          path: dist/

      - name: Install the wheel in an isolated venv
        run: |
          set -euo pipefail
          python -m venv .smoke-venv
          # shellcheck disable=SC1091
          source .smoke-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Verify the CLI version matches the release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source .smoke-venv/bin/activate
          # Strip the leading "v" so v0.1.3 → 0.1.3
          EXPECTED="${RELEASE_TAG#v}"
          CLI_VERSION="$(agent-generator --version | tr -d '[:space:]')"
          PKG_VERSION="$(python -c 'import agent_generator; print(agent_generator.__version__)')"
          echo "Expected: $EXPECTED"
          echo "CLI:      $CLI_VERSION"
          echo "Package:  $PKG_VERSION"
          if [[ "$CLI_VERSION" != *"$EXPECTED"* ]]; then
            echo "::error::CLI version '$CLI_VERSION' does not match release tag '$EXPECTED'"
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$EXPECTED" ]]; then
            echo "::error::Package __version__ '$PKG_VERSION' does not match release tag '$EXPECTED'"
            exit 1
          fi

      - name: Tiny end-to-end CLI smoke
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source .smoke-venv/bin/activate
          agent-generator --help >/dev/null

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: smoke
    environment:
      name: pypi
      url: https://pypi.org/project/agent-generator/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: python-dists
          path: dist/

      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
