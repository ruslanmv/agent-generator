name: release-app

# Single orchestrator workflow that fans out on `v*.*.*` tags:
#   - frontend web image (this workflow)
#   - backend image (waits for .github/workflows/backend-image.yml)
#   - desktop bundles (waits for .github/workflows/desktop.yml)
#   - Android AAB (waits for .github/workflows/mobile.yml)
#   - Helm chart (package + push to GHCR OCI registry)
#   - Sentry release (commit metadata + sourcemaps)
#
# Aggregates every artefact onto the GitHub Release and promotes the
# draft to public once every dependent workflow has finished green.
#
# Disjoint from the pre-existing release.yml (PyPI CLI publish) on
# purpose — both can coexist on the same v*.*.* tag.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: meta
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          toTag: ${{ env.RELEASE_TAG }}
          configurationJson: |
            {
              "categories": [
                { "title": "## ✨ Features",     "labels": ["feature", "feat"] },
                { "title": "## 🐛 Fixes",        "labels": ["fix", "bug"] },
                { "title": "## 🔒 Security",     "labels": ["security"] },
                { "title": "## 📦 Build / CI",   "labels": ["ci", "build"] }
              ]
            }

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

  # ── Frontend web image (nginx) ─────────────────────────────────
  web-image:
    name: web image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-generator-web:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/agent-generator-web:latest
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3
      - name: cosign keyless sign
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/agent-generator-web@${DIGEST}"

      - name: GitHub attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/agent-generator-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ── Wait for the per-shell workflows ───────────────────────────
  wait-backend-image:
    name: wait · backend-image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            run="$(gh run list --workflow backend-image.yml --branch "$RELEASE_TAG" --limit 1 --json status,conclusion -q '.[0]')"
            [ -n "$run" ] || { sleep 20; continue; }
            status="$(echo "$run" | jq -r .status)"
            if [ "$status" = "completed" ]; then
              conclusion="$(echo "$run" | jq -r .conclusion)"
              [ "$conclusion" = "success" ] && exit 0 || { echo "backend-image $conclusion" >&2; exit 1; }
            fi
            sleep 30
          done
          echo "timed out waiting for backend-image.yml" >&2; exit 1

  wait-desktop:
    name: wait · desktop
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 90); do
            run="$(gh run list --workflow desktop.yml --branch "$RELEASE_TAG" --limit 1 --json status,conclusion -q '.[0]')"
            [ -n "$run" ] || { sleep 20; continue; }
            status="$(echo "$run" | jq -r .status)"
            if [ "$status" = "completed" ]; then
              [ "$(echo "$run" | jq -r .conclusion)" = "success" ] && exit 0 || exit 1
            fi
            sleep 30
          done
          echo "timed out waiting for desktop.yml" >&2; exit 1

  wait-mobile:
    name: wait · mobile
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            run="$(gh run list --workflow mobile.yml --branch "$RELEASE_TAG" --limit 1 --json status,conclusion -q '.[0]')"
            [ -n "$run" ] || { sleep 20; continue; }
            status="$(echo "$run" | jq -r .status)"
            if [ "$status" = "completed" ]; then
              [ "$(echo "$run" | jq -r .conclusion)" = "success" ] && exit 0 || exit 1
            fi
            sleep 30
          done
          echo "timed out waiting for mobile.yml" >&2; exit 1

  # ── Helm chart bump + push ────────────────────────────────────
  helm:
    name: helm chart
    runs-on: ubuntu-latest
    needs: [prepare, web-image, wait-backend-image]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Bump chart version + appVersion
        working-directory: deploy/helm/agent-generator
        run: |
          set -euo pipefail
          sed -i -E "s/^version: .+/version: ${{ needs.prepare.outputs.version }}/" Chart.yaml
          sed -i -E "s/^appVersion: .+/appVersion: \"${{ needs.prepare.outputs.version }}\"/" Chart.yaml
          sed -i -E "s|(tag: ).+|\1\"${{ needs.prepare.outputs.version }}\"|g" values.yaml

      - name: Package
        working-directory: deploy/helm
        run: |
          mkdir -p dist
          helm package agent-generator -d dist/

      - name: Push chart to OCI registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | helm registry login -u "${{ github.actor }}" --password-stdin ghcr.io
          helm push "deploy/helm/dist/agent-generator-${{ needs.prepare.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: deploy/helm/dist/

  # ── Sentry release ─────────────────────────────────────────────
  sentry:
    name: sentry release
    runs-on: ubuntu-latest
    needs: [prepare, web-image, wait-backend-image]
    if: github.event_name == 'push'
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: getsentry/action-release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: prod
          version: agent-generator-backend@${{ needs.prepare.outputs.version }}

  # ── Promote the draft once every dependency is green ──────────
  promote:
    name: publish release
    runs-on: ubuntu-latest
    needs: [prepare, web-image, wait-backend-image, wait-desktop, wait-mobile, helm]
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
