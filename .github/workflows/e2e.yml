name: e2e

# End-to-end smoke flows. Two paths:
#
#   1. web — Playwright runs against `vite preview` of the SPA on
#      every push / PR touching frontend/ or e2e/web/.
#   2. mobile — Maestro runs against an Android x86_64 emulator on
#      every push / PR touching frontend/, shells/mobile/, or
#      e2e/mobile/. Built on top of the same debug APK the
#      mobile.yml workflow produces.
#
# Both jobs upload a report on failure so flakes are diagnosable
# without re-running locally.

on:
  push:
    branches: [master, "claude/**"]
    paths:
      - "frontend/**"
      - "e2e/**"
      - "shells/mobile/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "e2e/**"
      - "shells/mobile/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (Playwright)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the SPA
        working-directory: frontend
        env:
          AG_BUILD_CHANNEL: web
        run: |
          npm ci
          npm run build

      - name: Install Playwright deps
        working-directory: e2e/web
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: e2e/web
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/web/playwright-report
          if-no-files-found: ignore

  mobile:
    name: mobile (Maestro)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # The Android emulator action needs KVM, which only the
    # ubuntu-22.04 runners have on GitHub-hosted infra.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-33 build-tools;33.0.2 system-images;android-33;default;x86_64 emulator"

      - name: Frontend build
        working-directory: frontend
        env:
          AG_BUILD_CHANNEL: capacitor
        run: |
          npm ci
          npm run build

      - name: Capacitor sync + build debug APK
        working-directory: shells/mobile
        run: |
          npm install --no-audit --no-fund
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync
          ( cd android && ./gradlew assembleDebug --no-daemon )

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r shells/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test e2e/mobile/flows

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-report
          path: ~/.maestro/tests
          if-no-files-found: ignore
