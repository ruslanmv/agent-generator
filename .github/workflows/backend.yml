name: backend

on:
  push:
    branches: [master, "claude/**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    name: lint · type-check · test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install project + dev deps
        run: uv pip install --system -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: agent-generator-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
