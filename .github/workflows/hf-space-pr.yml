name: hf-space-pr

# Smoke-test the Hugging Face Space deploy tree on every PR that
# touches the relevant paths. We build the SPA, run the slim
# space_app pytest suite against the vendored shared modules, and
# verify the deploy stage assembles cleanly. We do NOT push to HF.

on:
  pull_request:
    paths:
      - "hf/**"
      - "frontend/**"
      - "backend/app/api/compatibility.py"
      - "backend/app/api/marketplace.py"
      - ".github/workflows/hf-space.yml"
      - ".github/workflows/hf-space-pr.yml"

permissions:
  contents: read

concurrency:
  group: hf-space-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: build · test · stage
    runs-on: ubuntu-latest
    env:
      AG_BUILD_CHANNEL: hf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build the SPA (hf channel)
        working-directory: frontend
        env:
          AG_BUILD_CHANNEL: hf
        run: |
          npm ci
          npm run build
          test -f dist/index.html

      - name: Stage shared modules
        run: |
          mkdir -p hf/space_app/_shared
          cp backend/app/api/compatibility.py hf/space_app/_shared/compatibility.py
          cp backend/app/api/marketplace.py   hf/space_app/_shared/marketplace.py

      - name: Install Space backend deps
        run: |
          python -m pip install --upgrade pip
          # Skip the git+ install — exercise the local source tree instead.
          python -m pip install -e .
          python -m pip install \
            "fastapi>=0.115,<0.117" \
            "uvicorn[standard]>=0.32,<0.34" \
            "pydantic>=2.9,<3" \
            "pydantic-settings>=2.6,<3" \
            "httpx>=0.27,<0.29" \
            "python-multipart>=0.0.18" \
            "pyyaml>=6.0,<7" \
            "pytest>=8" \
            "pytest-asyncio>=0.24"

      - name: Run space_app tests
        working-directory: hf
        env:
          PYTHONPATH: .
        run: pytest tests -q

      - name: Verify deploy tree assembles
        run: |
          STAGE="$RUNNER_TEMP/hf-space"
          mkdir -p "$STAGE"
          rsync -a --delete --exclude='tests' --exclude='__pycache__' hf/ "$STAGE/"
          mkdir -p "$STAGE/frontend_dist"
          rsync -a --delete frontend/dist/ "$STAGE/frontend_dist/"
          test -f "$STAGE/space_app/main.py"
          test -f "$STAGE/space_app/_shared/compatibility.py"
          test -f "$STAGE/space_app/_shared/marketplace.py"
          test -f "$STAGE/frontend_dist/index.html"
          test -f "$STAGE/Dockerfile"
          test -f "$STAGE/requirements.txt"
          test -f "$STAGE/README.md"
          echo "  ✓ staged tree assembled at $STAGE"
