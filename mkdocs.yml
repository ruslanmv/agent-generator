# mkdocs.yml — configuration for the docs site.

site_name: agent-generator
site_description: Describe an AI team in plain English. Get a runnable project.
site_author: Ruslan M. V.
repo_url: https://github.com/ruslanmv/agent-generator
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Get started:
      - Install in 30s: installation.md
      - Usage: usage.md
      - Pick a framework: frameworks.md
  - Matrix engine:
      - Quickstart: matrix-engine/quickstart.md
      - mb — local-first CLI: matrix-engine/mb-cli.md
      - Public engine API (SDK): matrix-engine/public-engine-api.md
      - HTTP API: matrix-engine/http-api.md
      - Contracts: matrix-engine/contracts.md
      - Blueprint candidates: matrix-engine/blueprint-candidates.md
      - Controlled blueprint compiler: matrix-engine/controlled-blueprint-compiler.md
      - Standards loader: matrix-engine/standards-loader.md
      - Validation & repair: matrix-engine/validation-and-repair.md
      - AI coder adapters: matrix-engine/ai-coder-adapters.md
      - Matrix Bundle export: matrix-engine/matrix-bundle-export.md
      - MatrixHub publishing: matrix-engine/matrixhub-publishing.md
      - Repo boundary: matrix-engine/repo-boundary.md
      - Ruslan Magana Definitions: matrix-engine/ruslan-magana-definitions.md
      - Compatibility matrix: matrix-engine/compatibility-matrix.md
      - CI self-compliance: matrix-engine/ci-self-compliance.md
  - Integrations:
      - GitPilot: gitpilot-integration.md
      - MCP server: mcp-01.md
  - Architecture: architecture.md
  - Platform overview: platform.md
  - Operations:
      - Production readiness: production-readiness.md
      - Release process: release-process.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
