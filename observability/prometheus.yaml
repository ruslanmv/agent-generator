global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # The backend exposes /metrics when it's wired with the prometheus
  # FastAPI instrumentation (defer to Batch 32 follow-up). Until then
  # the collector pipes metrics into Prometheus via remote_write,
  # which is what this scrape config rides on top of.
