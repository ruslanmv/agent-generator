appId: io.agent_generator.app
name: deep-link-smoke
tags:
  - smoke
---
- launchApp:
    clearState: true
# Native `agent-generator://` deep-links are wired in the Tauri shell
# only (see frontend/src/lib/deep-link.ts). The Capacitor template
# ships without a matching Android intent filter, so for now we just
# verify the cold-launch lands on the build wizard — the same place
# the deep link would route to. Re-enable `openLink` once the intent
# filter is registered in shells/mobile/android/.
- extendedWaitUntil:
    visible: "New project"
    timeout: 30000
- assertVisible: "1/6"
