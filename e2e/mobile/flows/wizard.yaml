appId: io.agent_generator.app
name: wizard-smoke
tags:
  - smoke
---
- launchApp:
    clearState: true
# Cold launch routes to /generate, which renders the 6-step
# MobileGenerate flow at step 1 (Describe). Give the WebView up to
# 30 s to load the SPA before asserting — fonts.googleapis.com may be
# unreachable from the emulator and the network timeout dominates the
# first paint.
- extendedWaitUntil:
    visible: "New project"
    timeout: 30000
- assertVisible: "Generate"
- tapOn: "Generate"
# Step 2 — Framework picker.
- assertVisible: "Framework"
- assertVisible: "CrewAI"
