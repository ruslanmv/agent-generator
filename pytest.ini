# pytest.ini
[pytest]
addopts = -q
asyncio_mode = auto
markers =
    asyncio: marks tests as asyncio-based
    integration: slow/live integration tests
filterwarnings =
    # optional: keep the output clean
    ignore:Pydantic V1 style .*@validator.*:pydantic.PydanticDeprecatedSince20
    ignore:Using extra keyword arguments on `Field` is deprecated.*:pydantic.PydanticDeprecatedSince20
    ignore:Pydantic V1 style .*@root_validator.*:pydantic.PydanticDeprecatedSince20
