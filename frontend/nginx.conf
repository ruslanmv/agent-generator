server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets; revalidate index.html on every request so
  # the SPA picks up the latest build immediately after a rollout.
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }

  # SPA fallback — serve index.html for any unknown path so React Router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Useful security defaults. Adjust CSP when wiring the real backend.
  add_header X-Frame-Options DENY                  always;
  add_header X-Content-Type-Options nosniff        always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
}
